    <!-- ── Primary SEO ── -->
    <title>Revenue Leak Calculator for Skincare Brands | Audr</title>
    <meta name="description" content="Find out how much creative fatigue is silently draining from your skincare brand. Answer 16 questions, get your free Revenue Leak Report and a personalised Loom teardown — no strings attached." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://audr.io/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://audr.io/" />
    <meta property="og:site_name" content="Audr" />
    <meta property="og:title" content="You didn't start this brand to fight Meta's algorithm | Audr" />
    <meta property="og:description" content="Take the 3-minute Revenue Leak Calculator. Find out how much your skincare brand is losing to creative fatigue and get a free Loom teardown showing what your competitors' ads say that yours don't." />
    <meta property="og:image" content="https://audr.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="You didn't start this brand to fight Meta's algorithm | Audr" />
    <meta name="twitter:description" content="Take the 3-minute Revenue Leak Calculator. Find out how much your skincare brand is losing to creative fatigue — free report, free Loom teardown, no strings." />
    <meta name="twitter:image" content="https://audr.io/og-image.png" />

    <!-- ── Structured data: WebSite ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Audr",
      "url": "https://audr.io/",
      "description": "Audr is an audience intelligence platform for DTC skincare brands. The Revenue Leak Calculator scores your creative fatigue risk and estimates how much monthly revenue your Meta ads are leaving behind.",
      "publisher": {
        "@type": "Organization",
        "name": "Audr / Envision Digital",
        "url": "https://audr.io/"
      }
    }
    </script>

    <!-- ── Structured data: FAQPage ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is the Revenue Leak Calculator actually free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, fully. The calculator, the Revenue Leak Report, and the personalised Loom teardown are all free. No credit card, no demo booking required. If the report is useful and you want to explore working together, that conversation happens on your terms."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the revenue leak number?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It is based on your actual spend, AOV, ROAS, and creative patterns — the same logic applied to client accounts. It won't be perfect without a full audit, but it will be directionally honest."
          }
        },
        {
          "@type": "Question",
          "name": "What is in the free Loom teardown?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A personalised video walkthrough of your brand's Meta ad strategy. We analyse your live ads, your competitors' ads, and the gap between what your ads say and what your customers actually care about — the kind of analysis most agencies charge for."
          }
        },
        {
          "@type": "Question",
          "name": "Do you need access to my Meta ad account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The calculator works entirely from your answers. The Loom teardown uses publicly available data from the Meta Ad Library and our audience intelligence tools. No logins, no permissions, no access requests."
          }
        },
        {
          "@type": "Question",
          "name": "Who is the Revenue Leak Calculator built for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DTC skincare and beauty brands spending £10k+ per month on Meta ads, typically doing £1–5M in annual revenue, who have seen performance plateau or decline despite producing regular creative."
          }
        },
        {
          "@type": "Question",
          "name": "What is creative fatigue in Meta advertising?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Creative fatigue occurs when your target audience has seen your ads so many times that engagement drops and costs rise. It is measured by how frequently you refresh ad creative, how many distinct angles you run, and whether your messaging reflects the actual language your customers use."
          }
        }
      ]
    }
    </script>

    <!-- ── Structured data: SoftwareApplication (the calculator tool) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Audr Revenue Leak Calculator",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP"
      },
      "description": "A 16-question diagnostic that scores your creative fatigue risk and estimates monthly revenue lost to underperforming Meta ads. Built for DTC skincare brands doing £100k+ per month.",
      "url": "https://audr.io/"
    }
    </script>

    <!-- Paint dark immediately — no white flash before CSS loads -->
    <style>
      html { background: #0b0b0e; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
