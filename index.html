    <!-- ── Structured data: FAQPage ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is this actually free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, fully. The calculator, the Revenue Leak Report, and the personalised Loom teardown are all free. No credit card, no demo booking required. If the report is useful and you want to explore working together, that conversation happens on your terms."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the revenue leak estimate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It's based on your actual spend, AOV, ROAS, and creative patterns — the same logic we apply to client accounts. It won't be perfect (that requires a full audit), but it will be directionally honest."
          }
        },
        {
          "@type": "Question",
          "name": "What's in the Loom teardown?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A personalised video walkthrough of your brand's Meta ad strategy. We analyse your live ads, your competitors' ads, and the gap between what your ads say and what your customers actually care about — the kind of analysis most agencies charge for."
          }
        },
        {
          "@type": "Question",
          "name": "Do you need access to my ad account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The calculator works entirely from your answers. The Loom teardown uses publicly available data from the Meta Ad Library and our audience intelligence tools. No logins, no permissions, no access requests."
          }
        },
        {
          "@type": "Question",
          "name": "I'm not a skincare brand. Can I still use it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The calculator is calibrated specifically for DTC skincare and beauty brands. If that's not you, the numbers won't be as relevant. We're building versions for other verticals, so check back."
          }
        },
        {
          "@type": "Question",
          "name": "Is this a pitch for your agency?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. This is a diagnostic tool. If the report shows a problem and you want help fixing it, we can talk about that. But the report stands on its own. Most brands find it useful whether they work with us or not."
          }
        }
      ]
    }
    </script>
